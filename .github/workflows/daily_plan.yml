name: Daily outreach plan

# This is what makes "picture it running every morning" real instead of a
# sentence in the README - no person has to remember to run anything.
#
# Schedule below is 7am UTC daily; also runnable on-demand from the Actions
# tab for testing (workflow_dispatch).
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # needed for the keep-alive commit below

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # The SQLite DB is the tool's only state (who's been contacted, what's
      # in cooldown, etc). GitHub Actions runners are thrown away after every
      # run, so without this the tool would "forget" everything and re-plan
      # from scratch each morning. This cache-as-poor-mans-database trick is
      # fine for a lightweight scheduled bot like this one; a real production
      # setup at Fleek's actual scale would point this at a hosted Postgres
      # instance instead (same SQL, see ARCHITECTURE.md) rather than relying
      # on GitHub's cache, which isn't guaranteed-durable storage.
      #
      # Uses the combined cache action (restore + automatic save at job end)
      # rather than the separate restore/save actions - the split version hit
      # an intermittent "Cache save failed" on GitHub's backend during actual
      # testing of this workflow; the combined action is the far more common,
      # better-tested pattern and avoids that failure mode.
      - name: Restore/save pipeline database
        uses: actions/cache@v4
        with:
          path: output/fleek.db
          key: fleek-db-${{ github.run_id }}
          restore-keys: fleek-db-

      # Placeholder for wherever new lead-drop files actually come from in
      # production (a scheduled CRM export, an Instagram-scraper output,
      # etc) - they'd land in data/incoming/ here before this step runs.
      # auto-ingest itself is already idempotent either way.
      - name: Run daily pipeline
        run: ./run_daily.sh

      - name: Upload today's outreach queues
        uses: actions/upload-artifact@v4
        with:
          name: outreach-${{ github.run_id }}
          path: output/*.csv
          retention-days: 14

      # GitHub auto-disables a scheduled workflow after 60 days with no
      # repository activity at all (a documented platform behaviour, not a
      # bug) - silent until someone happens to notice the cron stopped
      # firing. A real commit every successful run resets that clock every
      # single day, so it can never go quiet for 60 days while this is
      # actually working. Also publishes docs/data/latest.json, which is
      # what the GitHub Pages dashboard (docs/index.html) reads - so the
      # live viewer updates every morning along with everything else.
      - name: Record run + publish dashboard data
        run: |
          echo "# Pipeline status" > STATUS.md
          echo "" >> STATUS.md
          echo "Last successful automated run: $(date -u +"%Y-%m-%d %H:%M UTC")" >> STATUS.md
          echo "" >> STATUS.md
          echo "See the Actions tab for full run history and today's outreach queues." >> STATUS.md
          git config user.name "fleek-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add STATUS.md docs/data/latest.json
          git diff --staged --quiet || git commit -m "Automated daily run: $(date -u +%Y-%m-%d)"
          git push
